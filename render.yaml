# Cấu hình Render (Blueprint) — đồng bộ với Dashboard nếu bật
services:
  - type: web
    name: nong-san-xanh
    runtime: python
    plan: free
    branch: main
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: 3.11.9
